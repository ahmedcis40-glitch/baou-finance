name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android platform
        run: |
          cd mobile-flutter
          flutter create --project-name=baou . --platforms=android

      - name: Patch Android - Allow HTTP cleartext traffic
        run: |
          # Copier le AndroidManifest.xml patché (avec usesCleartextTraffic + networkSecurityConfig)
          cp mobile-flutter/android_patches/AndroidManifest.xml \
             mobile-flutter/android/app/src/main/AndroidManifest.xml

          # Copier le fichier network_security_config.xml
          mkdir -p mobile-flutter/android/app/src/main/res/xml
          cp mobile-flutter/android_patches/network_security_config.xml \
             mobile-flutter/android/app/src/main/res/xml/network_security_config.xml

          echo "✅ Patch HTTP cleartext appliqué avec succès"
          cat mobile-flutter/android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: |
          cd mobile-flutter
          flutter pub get

      - name: Generate launcher icons
        run: |
          cd mobile-flutter
          dart run flutter_launcher_icons

      - name: Build APK
        run: |
          cd mobile-flutter
          flutter build apk --release --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaouMobileApk
          path: mobile-flutter/build/app/outputs/flutter-apk/app-release.apk
